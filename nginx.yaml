apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 1  # 指定两个副本，以提高高可用性
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:latest  # 使用最新版本的 Nginx 镜像
          ports:
            - containerPort: 80  # 容器内的 Nginx 服务端口
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort  # 使用 NodePort 类型的服务
  ports:
    - port: 80  # Service 端口
      targetPort: 80  # 容器内的目标端口
      nodePort: 30012  # NodePort 类型的实际端口
  selector:
    app: nginx  # 选择标签为 app: nginx 的 Pod
